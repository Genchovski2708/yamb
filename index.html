<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1d24">
<title>Yamb</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<div class="app">
  <header>
    <h1>Yamb</h1>
    <div class="header-right">
      <div class="info">
        <span class="label">Score</span>
        <span id="score" class="score">0</span>
      </div>
      <div class="info">
        <span class="label">Throws left</span>
        <span id="throws" class="throws">3</span>
      </div>
    </div>
  </header>

  <main>
    <section class="sheet" id="sheet"><!-- generated by JS --></section>

    <section class="controls">
      <div class="dice-row" id="dice-row"><!-- generated by JS --></div>

      <div class="action-row">
        <button id="btn-roll" class="primary">Roll</button>
        <button id="btn-undo" class="ghost">Undo</button>
        <button id="btn-new" class="ghost">New game</button>
      </div>

      <div id="message" class="message hidden"></div>
    </section>
  </main>
</div>

<script type="module" src="ui.js"></script>
</body>
</html>
